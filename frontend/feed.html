<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecto – Feed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar" id="navbar"></nav>

<!-- ── Main Layout ─────────────────────────────────────────── -->
<div class="two-col">

  <!-- ── Left: Feed ─────────────────────────────────────── -->
  <main>

    <!-- Post Composer -->
    <div class="card mb-16" id="composer-card">
      <div class="composer">
        <div class="composer-top">
          <div id="composer-avatar"></div>
          <textarea id="post-content" placeholder="What's on your mind?" rows="3"
                    maxlength="1000"></textarea>
        </div>
        <!-- Image preview -->
        <div id="img-preview-wrap" class="hidden">
          <img id="img-preview" src="" alt="Preview">
          <button id="remove-img" onclick="removeImage()" title="Remove image">✕</button>
        </div>
        <div class="composer-actions">
          <div class="left">
            <label class="btn btn-sm" style="cursor:pointer" title="Add image">
              📷 Photo
              <input type="file" id="post-image" accept="image/*" class="hidden"
                     onchange="previewImage(event)">
            </label>
          </div>
          <button class="btn btn-primary btn-sm" onclick="createPost()">Post</button>
        </div>
      </div>
    </div>

    <!-- Feed Tabs -->
    <div class="feed-tabs-wrap">
      <div class="tabs">
        <button class="tab-btn active" id="tab-all"
                onclick="switchFeedTab('all')">🌐 All Posts</button>
        <button class="tab-btn" id="tab-my"
                onclick="switchFeedTab('my')">👥 Following</button>
      </div>
    </div>

    <!-- Post list -->
    <div id="posts-container">
      <div class="spinner"></div>
    </div>

  </main>

  <!-- ── Right: Sidebar ────────────────────────────────── -->
  <aside class="sidebar">
    <div class="card">
      <h3>Suggested Users</h3>
      <div id="suggested-users"><div class="spinner"></div></div>
    </div>
  </aside>

</div>

<script src="js/app.js"></script>
<script>
requireAuth();  // Redirect to login if not authenticated

let currentTab  = 'all';
const currentUser = getUser();

// ── Composer avatar ───────────────────────────────────────
document.getElementById('composer-avatar').innerHTML =
  avatarHTML(currentUser);

// ── Image preview ─────────────────────────────────────────
function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('img-preview').src = ev.target.result;
    document.getElementById('img-preview-wrap').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  document.getElementById('post-image').value      = '';
  document.getElementById('img-preview').src       = '';
  document.getElementById('img-preview-wrap').classList.add('hidden');
}

// ── Create post ───────────────────────────────────────────
async function createPost() {
  const content   = document.getElementById('post-content').value.trim();
  const imageFile = document.getElementById('post-image').files[0];

  if (!content) { showToast('Please write something first!', 'error'); return; }

  const form = new FormData();
  form.append('content', content);
  if (imageFile) form.append('image', imageFile);

  try {
    const res = await apiFetch('/posts', { method: 'POST', body: form });
    const data = await res.json();

    if (!res.ok) { showToast(data.error || 'Failed to post', 'error'); return; }

    document.getElementById('post-content').value = '';
    removeImage();
    showToast('Post shared! 🎉', 'success');
    loadPosts();   // Refresh feed
  } catch (err) {
    showToast('Network error.', 'error');
  }
}

// ── Feed tab switching ────────────────────────────────────
function switchFeedTab(tab) {
  currentTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-my').classList.toggle('active',  tab === 'my');
  loadPosts();
}

// ── Load posts ────────────────────────────────────────────
async function loadPosts() {
  const container = document.getElementById('posts-container');
  container.innerHTML = '<div class="spinner"></div>';

  try {
    const endpoint = currentTab === 'my' ? '/posts/myfeed' : '/posts/feed';
    const res   = await apiFetch(endpoint);
    const posts = await res.json();

    if (posts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>${currentTab === 'my'
              ? 'No posts from people you follow yet. Follow some users!'
              : 'No posts yet. Be the first to post!'}</p>
        </div>`;
      return;
    }

    container.innerHTML = posts.map(renderPost).join('');
  } catch (err) {
    container.innerHTML = `<div class="empty-state"><p>Failed to load posts.</p></div>`;
  }
}

// ── Render a single post card ─────────────────────────────
function renderPost(p) {
  const isOwner = p.user_id === currentUser.id;
  const liked   = p.liked_by_me > 0;

  return `
  <div class="card post-card" id="post-${p.id}">
    <div class="post-header">
      <a href="profile.html?u=${p.username}" style="display:flex;align-items:center;gap:10px;text-decoration:none">
        ${avatarHTML(p)}
        <div class="post-meta">
          <span class="username">${p.username}</span>
          <div class="time">⏱ ${timeAgo(p.created_at)}</div>
        </div>
      </a>
      ${isOwner ? `
        <div class="post-menu" style="margin-left:auto">
          <button class="post-menu-btn" onclick="toggleMenu(${p.id})">⋯</button>
          <div class="dropdown" id="menu-${p.id}">
            <button class="danger" onclick="deletePost(${p.id})">🗑 Delete Post</button>
          </div>
        </div>` : ''}
    </div>

    <div class="post-content">${escapeHtml(p.content)}</div>

    ${p.image_url
      ? `<img class="post-image" src="${BACKEND_URL}${p.image_url}" alt="Post image">`
      : ''}

    <!-- Action bar -->
    <div class="post-actions">
      <button class="action-btn ${liked ? 'liked' : ''}"
              id="like-btn-${p.id}"
              onclick="toggleLike(${p.id})">
        <span class="icon">${liked ? '❤️' : '🤍'}</span>
        <span id="like-count-${p.id}">${p.like_count}</span> Likes
      </button>

      <button class="action-btn" onclick="toggleComments(${p.id})">
        <span class="icon">💬</span>
        <span id="comment-count-${p.id}">${p.comment_count}</span> Comments
      </button>
    </div>

    <!-- Comments section (lazy loaded) -->
    <div class="comments-section" id="comments-${p.id}">
      <div id="comments-list-${p.id}"></div>
      <div class="comment-form">
        ${avatarHTML(currentUser, 'sm')}
        <input class="comment-input" type="text"
               placeholder="Write a comment…"
               id="comment-input-${p.id}"
               onkeydown="if(event.key==='Enter') submitComment(${p.id})">
        <button class="comment-submit" onclick="submitComment(${p.id})">➤</button>
      </div>
    </div>
  </div>`;
}

// ── Toggle 3-dot menu ─────────────────────────────────────
function toggleMenu(postId) {
  const menu = document.getElementById(`menu-${postId}`);
  menu.classList.toggle('open');
  // Close other open menus
  document.querySelectorAll('.dropdown.open').forEach(m => {
    if (m.id !== `menu-${postId}`) m.classList.remove('open');
  });
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.post-menu')) {
    document.querySelectorAll('.dropdown.open').forEach(m => m.classList.remove('open'));
  }
});

// ── Like toggle ───────────────────────────────────────────
async function toggleLike(postId) {
  try {
    const res  = await apiFetch(`/likes/${postId}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) return;

    const btn   = document.getElementById(`like-btn-${postId}`);
    const count = document.getElementById(`like-count-${postId}`);
    btn.querySelector('.icon').textContent = data.liked ? '❤️' : '🤍';
    btn.classList.toggle('liked', data.liked);
    count.textContent = data.like_count;
  } catch (e) { showToast('Could not like post', 'error'); }
}

// ── Comments ──────────────────────────────────────────────
async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  section.classList.toggle('open');

  if (section.classList.contains('open')) {
    await loadComments(postId);
  }
}

async function loadComments(postId) {
  const list = document.getElementById(`comments-list-${postId}`);
  list.innerHTML = '<div class="spinner" style="padding:12px"></div>';

  const res      = await apiFetch(`/comments/${postId}`);
  const comments = await res.json();

  list.innerHTML = comments.length
    ? comments.map(c => `
        <div class="comment-item">
          ${avatarHTML(c, 'sm')}
          <div class="comment-bubble">
            <a href="profile.html?u=${c.username}" class="c-username">${c.username}</a>
            <div class="c-text">${escapeHtml(c.content)}</div>
            <div class="c-time">${timeAgo(c.created_at)}</div>
          </div>
        </div>`).join('')
    : '<p class="text-muted" style="font-size:.85rem;padding:8px 0">No comments yet. Be first!</p>';
}

async function submitComment(postId) {
  const input   = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;

  const res  = await apiFetch(`/comments/${postId}`, {
    method: 'POST',
    body:   JSON.stringify({ content })
  });
  const data = await res.json();

  if (!res.ok) { showToast(data.error, 'error'); return; }

  input.value = '';
  // Update count
  const countEl = document.getElementById(`comment-count-${postId}`);
  countEl.textContent = parseInt(countEl.textContent) + 1;
  await loadComments(postId);
}

// ── Delete post ───────────────────────────────────────────
async function deletePost(postId) {
  if (!confirm('Delete this post? This cannot be undone.')) return;

  const res = await apiFetch(`/posts/${postId}`, { method: 'DELETE' });
  if (res.ok) {
    document.getElementById(`post-${postId}`).remove();
    showToast('Post deleted.', 'success');
  } else {
    showToast('Could not delete post.', 'error');
  }
}

// ── Load suggested users (sidebar) ───────────────────────
async function loadSuggestedUsers() {
  try {
    const res   = await apiFetch('/users/search?q=');
    const users = await res.json();
    const el    = document.getElementById('suggested-users');

    const suggestions = users.filter(u => u.id !== currentUser.id).slice(0, 5);
    el.innerHTML = suggestions.length
      ? suggestions.map(u => `
          <div class="sidebar-user">
            ${avatarHTML(u, 'sm')}
            <div class="info">
              <a href="profile.html?u=${u.username}" class="name">${u.username}</a>
              <div class="bio">${u.bio || 'No bio yet'}</div>
            </div>
          </div>`).join('')
      : '<p class="text-muted" style="font-size:.85rem">No suggestions</p>';
  } catch (e) { /* silently fail */ }
}

// ── HTML escape helper ────────────────────────────────────
function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────
loadPosts();
loadSuggestedUsers();
</script>
</body>
</html>
