<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecto – Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container" style="padding-top:0">

  <!-- Profile card -->
  <div class="card mb-16" id="profile-card">
    <div class="spinner"></div>
  </div>

  <!-- Profile tabs -->
  <div class="tabs" id="profile-tabs" style="display:none">
    <button class="tab-btn active" id="tab-posts"     onclick="showProfileTab('posts')">📝 Posts</button>
    <button class="tab-btn"        id="tab-followers" onclick="showProfileTab('followers')">👥 Followers</button>
    <button class="tab-btn"        id="tab-following" onclick="showProfileTab('following')">➕ Following</button>
  </div>

  <!-- Tab panels -->
  <div id="panel-posts"></div>
  <div id="panel-followers" class="hidden"></div>
  <div id="panel-following" class="hidden"></div>

  <!-- Edit profile modal -->
  <div id="edit-modal" class="hidden" style="
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    z-index:500;display:flex;align-items:center;justify-content:center">
    <div class="card" style="width:100%;max-width:420px;padding:28px">
      <h2 style="margin-bottom:20px">Edit Profile</h2>
      <form onsubmit="saveProfile(event)">
        <div class="form-group">
          <label>Bio</label>
          <textarea class="form-control" id="edit-bio" rows="3"
                    placeholder="Tell the world about yourself…"></textarea>
        </div>
        <div class="form-group">
          <label>Profile Picture</label>
          <input type="file" class="form-control" id="edit-pic" accept="image/*">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-outline"
                  onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
requireAuth();

const currentUser = getUser();
// Get ?u=username from URL
const username = new URLSearchParams(window.location.search).get('u')
              || currentUser.username;

let profileData = null;

// ── Escape HTML helper ────────────────────────────────────
function escapeHtml(str = '') {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Load profile ──────────────────────────────────────────
async function loadProfile() {
  try {
    const res  = await apiFetch(`/users/${username}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('profile-card').innerHTML =
        '<div class="empty-state"><p>User not found.</p></div>';
      return;
    }

    profileData = data;
    renderProfile(data);
    renderPosts(data.posts);
    document.getElementById('profile-tabs').style.display = 'flex';
  } catch (err) {
    console.error(err);
  }
}

// ── Render profile header ─────────────────────────────────
function renderProfile(u) {
  const isOwn      = u.id === currentUser.id;
  const isFollowing = u.is_following;

  document.getElementById('profile-card').innerHTML = `
    <div class="profile-cover"></div>
    <div class="profile-info">
      <div class="profile-avatar-wrap">
        ${avatarHTML(u, 'lg')}
      </div>
      <div class="profile-name">${escapeHtml(u.username)}</div>
      <div class="profile-bio">${escapeHtml(u.bio || 'No bio yet.')}</div>
      <div class="profile-stats">
        <div class="stat">
          <span class="stat-num">${u.posts.length}</span>
          <span class="stat-label">Posts</span>
        </div>
        <div class="stat" style="cursor:pointer" onclick="showProfileTab('followers')">
          <span class="stat-num" id="followers-count">${u.followers_count}</span>
          <span class="stat-label">Followers</span>
        </div>
        <div class="stat" style="cursor:pointer" onclick="showProfileTab('following')">
          <span class="stat-num">${u.following_count}</span>
          <span class="stat-label">Following</span>
        </div>
      </div>
      <div class="profile-actions">
        ${isOwn
          ? `<button class="btn btn-outline" onclick="openEditModal()">✏️ Edit Profile</button>`
          : `<button class="btn ${isFollowing ? 'btn-outline' : 'btn-primary'}"
                     id="follow-btn" onclick="toggleFollow(${u.id})">
               ${isFollowing ? '✓ Following' : '+ Follow'}
             </button>`
        }
        ${!isOwn ? `<a class="btn btn-outline" href="feed.html">🏠 Feed</a>` : ''}
      </div>
    </div>`;
}

// ── Render posts grid ─────────────────────────────────────
function renderPosts(posts) {
  const panel = document.getElementById('panel-posts');
  if (!posts || posts.length === 0) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>No posts yet.</p>
      </div>`;
    return;
  }

  panel.innerHTML = posts.map(p => `
    <div class="card post-card" id="post-${p.id}">
      <div class="post-content">${escapeHtml(p.content)}</div>
      ${p.image_url
        ? `<img class="post-image" src="http://localhost:5000${p.image_url}" alt="">`
        : ''}
      <div class="post-actions">
        <button class="action-btn ${p.liked_by_me ? 'liked' : ''}"
                id="like-btn-${p.id}" onclick="toggleLike(${p.id})">
          <span class="icon">${p.liked_by_me ? '❤️' : '🤍'}</span>
          <span id="like-count-${p.id}">${p.like_count}</span> Likes
        </button>
        <button class="action-btn" onclick="toggleComments(${p.id})">
          💬 <span>${p.comment_count}</span> Comments
        </button>
        ${p.user_id === currentUser.id
          ? `<button class="action-btn" style="color:var(--danger)"
                     onclick="deletePost(${p.id})">🗑 Delete</button>`
          : ''}
      </div>
      <div class="comments-section" id="comments-${p.id}">
        <div id="comments-list-${p.id}"></div>
        <div class="comment-form">
          ${avatarHTML(currentUser, 'sm')}
          <input class="comment-input" type="text" placeholder="Comment…"
                 id="comment-input-${p.id}"
                 onkeydown="if(event.key==='Enter') submitComment(${p.id})">
          <button class="comment-submit" onclick="submitComment(${p.id})">➤</button>
        </div>
      </div>
    </div>`).join('');
}

// ── Profile tab switcher ──────────────────────────────────
async function showProfileTab(tab) {
  ['posts','followers','following'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });

  if (tab === 'followers') await loadFollowers();
  if (tab === 'following') await loadFollowing();
}

async function loadFollowers() {
  const panel = document.getElementById('panel-followers');
  panel.innerHTML = '<div class="spinner"></div>';

  const res   = await apiFetch(`/follow/${profileData.id}/followers`);
  const users = await res.json();
  renderUserList(users, panel);
}

async function loadFollowing() {
  const panel = document.getElementById('panel-following');
  panel.innerHTML = '<div class="spinner"></div>';

  const res   = await apiFetch(`/follow/${profileData.id}/following`);
  const users = await res.json();
  renderUserList(users, panel);
}

function renderUserList(users, container) {
  if (!users.length) {
    container.innerHTML = '<div class="empty-state"><p>Nobody here yet.</p></div>';
    return;
  }
  container.innerHTML = `<div class="card" style="padding:8px 0">` +
    users.map(u => `
      <div class="sidebar-user" style="padding:12px 16px">
        ${avatarHTML(u)}
        <div class="info">
          <a href="profile.html?u=${u.username}" class="name">${escapeHtml(u.username)}</a>
          <div class="bio">${escapeHtml(u.bio || '')}</div>
        </div>
      </div>`).join('') +
    `</div>`;
}

// ── Follow toggle ─────────────────────────────────────────
async function toggleFollow(userId) {
  const btn = document.getElementById('follow-btn');
  const res  = await apiFetch(`/follow/${userId}`, { method: 'POST' });
  const data = await res.json();

  if (!res.ok) { showToast(data.error, 'error'); return; }

  const isFollowing = data.following;
  btn.textContent = isFollowing ? '✓ Following' : '+ Follow';
  btn.className   = `btn ${isFollowing ? 'btn-outline' : 'btn-primary'}`;

  // Update follower count
  const fc = document.getElementById('followers-count');
  if (fc) fc.textContent = parseInt(fc.textContent) + (isFollowing ? 1 : -1);

  showToast(data.message, 'success');
}

// ── Like (same as feed) ───────────────────────────────────
async function toggleLike(postId) {
  const res  = await apiFetch(`/likes/${postId}`, { method: 'POST' });
  const data = await res.json();
  if (!res.ok) return;

  const btn   = document.getElementById(`like-btn-${postId}`);
  const count = document.getElementById(`like-count-${postId}`);
  btn.querySelector('.icon').textContent = data.liked ? '❤️' : '🤍';
  btn.classList.toggle('liked', data.liked);
  count.textContent = data.like_count;
}

// ── Comments (same as feed) ───────────────────────────────
async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`);
  section.classList.toggle('open');
  if (section.classList.contains('open')) await loadComments(postId);
}

async function loadComments(postId) {
  const list = document.getElementById(`comments-list-${postId}`);
  const res  = await apiFetch(`/comments/${postId}`);
  const comments = await res.json();
  list.innerHTML = comments.map(c => `
    <div class="comment-item">
      ${avatarHTML(c, 'sm')}
      <div class="comment-bubble">
        <a href="profile.html?u=${c.username}" class="c-username">${c.username}</a>
        <div class="c-text">${escapeHtml(c.content)}</div>
        <div class="c-time">${timeAgo(c.created_at)}</div>
      </div>
    </div>`).join('');
}

async function submitComment(postId) {
  const input   = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;

  const res = await apiFetch(`/comments/${postId}`, {
    method: 'POST', body: JSON.stringify({ content })
  });
  if (res.ok) { input.value = ''; await loadComments(postId); }
}

// ── Delete post ───────────────────────────────────────────
async function deletePost(postId) {
  if (!confirm('Delete this post?')) return;
  const res = await apiFetch(`/posts/${postId}`, { method: 'DELETE' });
  if (res.ok) {
    document.getElementById(`post-${postId}`).remove();
    showToast('Post deleted.', 'success');
  }
}

// ── Edit profile modal ────────────────────────────────────
function openEditModal() {
  document.getElementById('edit-bio').value = profileData.bio || '';
  document.getElementById('edit-modal').classList.remove('hidden');
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
}

async function saveProfile(e) {
  e.preventDefault();
  const bio  = document.getElementById('edit-bio').value;
  const pic  = document.getElementById('edit-pic').files[0];
  const form = new FormData();
  form.append('bio', bio);
  if (pic) form.append('profile_pic', pic);

  const res = await apiFetch('/users/update', { method: 'PUT', body: form });
  if (res.ok) {
    showToast('Profile updated!', 'success');
    closeEditModal();
    loadProfile();
  } else {
    showToast('Update failed.', 'error');
  }
}

// ── Init ──────────────────────────────────────────────────
loadProfile();
</script>
</body>
</html>
