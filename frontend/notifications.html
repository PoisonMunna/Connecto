<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecto – Notifications</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="font-size:1.3rem;font-weight:800">🔔 Notifications</h2>
    <button class="btn btn-outline btn-sm" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="card" id="notif-list">
    <div class="spinner"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
requireAuth();

const ICONS = { like: '❤️', comment: '💬', follow: '👤' };
const MSGS  = {
  like:    (u) => `<strong>${u}</strong> liked your post`,
  comment: (u) => `<strong>${u}</strong> commented on your post`,
  follow:  (u) => `<strong>${u}</strong> started following you`
};

async function loadNotifications() {
  const list = document.getElementById('notif-list');
  const res  = await apiFetch('/notifications');
  const data = await res.json();

  if (!data.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔔</div>
        <p>You're all caught up!</p>
      </div>`;
    return;
  }

  list.innerHTML = data.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}"
         onclick="${n.post_id ? `window.location.href='feed.html'` : `window.location.href='profile.html?u=${n.from_username}'`}"
         style="cursor:pointer">
      <span style="font-size:1.4rem">${ICONS[n.type]}</span>
      <div class="notif-text">${MSGS[n.type](n.from_username)}</div>
      <div class="notif-time">${timeAgo(n.created_at)}</div>
    </div>`).join('');

  // Mark all as read after viewing
  await apiFetch('/notifications/read', { method: 'PUT' });
}

async function markAllRead() {
  await apiFetch('/notifications/read', { method: 'PUT' });
  document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
  showToast('All notifications marked as read.', 'success');
}

loadNotifications();
</script>
</body>
</html>
